services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reclog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reclog}
      POSTGRES_DB: ${POSTGRES_DB:-reclog}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
